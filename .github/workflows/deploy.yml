name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.ritika0811 }}/devops-demo-flask

jobs:
  # ── Job 1: Build & Push Docker Image ───────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}   # only push on main
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to Kubernetes ─────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Substitute image tag in deployment manifest
        run: |
          sed -i "s|YOUR_DOCKERHUB_USERNAME/devops-demo-flask:latest|${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            k8s/flask-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f namespace.yaml
          kubectl apply -f redis-deployment.yaml
          kubectl apply -f redis-service.yaml
          kubectl apply -f flask-deployment.yaml
          kubectl apply -f flask-service.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/flask-app \
            -n devops-demo --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n devops-demo
          kubectl get services -n devops-demo

# ══════════════════════════════════════════════════════════════════════════════
# Required GitHub Secrets:
#
#   DOCKERHUB_USERNAME  — your DockerHub username
#   DOCKERHUB_TOKEN     — DockerHub access token (not your password)
#   KUBECONFIG_BASE64   — base64-encoded kubeconfig for your cluster
#                         Generate with: base64 -w0 ~/.kube/config
# ══════════════════════════════════════════════════════════════════════════════
