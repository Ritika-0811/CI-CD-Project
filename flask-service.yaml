apiVersion: v1
kind: Service
metadata:
  name: flask-app
  namespace: devops-demo
  labels:
    app: flask-app
    tier: backend
spec:
  selector:
    app: flask-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
  type: NodePort   # NodePort for local Kind cluster access; swap for LoadBalancer on cloud
